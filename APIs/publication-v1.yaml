      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/token
          refreshUrl: https://auth.example.com/token
          scopes:
            monitor: Monitor the service health
            norm:read: Read access to publication info
            norm:publish: Publish publication messages to the broker
            norm:subscribe: Receive publication messages from the broker
            norm:admin: Administer publication channels and subscriptions
