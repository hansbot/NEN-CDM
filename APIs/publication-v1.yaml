openapi: 3.1.0
info:
  title: NEN Publication API - to access the norms managed by NEN
  version: 0.9.2
  description: |
    API to access the standards managed by NEN: Standards Family > Standards Projects > Standards Publications > Resource Items
    Audience: clients continually updating a shadow library of standards content.
  contact:
    name: NEN Servicedesk IT
    email: ServicedeskITRegie@nen.nl
    url: 'https://www.nen.nl/contact-nl'
tags:
- name: Family
  description: Collection and item resource for Standard Families
- name: FamilyAdmin
  description: Collection and item resource for Standard FamilyAdmins
- name: Project
  description: Collection and item resource for Standard Projects
- name: Publication
  description: Collection and item resource for Standard Publications
- name: ReleaseItem
  description: Collection and item resource for Standard Resource Items
- name: Healthcheck
  description: to verify if the service is up and running healthily
- name: Event
  description: to publish an event to a channel
- name: Subscription
  description: to manage subscriptions for event channels
# Define the anchors once (before referencing them)
x-default-responses:
  getItem: &standardGetWithEtagResponses
    '304':
      $ref: './NenOasFragments.json#/responses/304'
    '400':
      $ref: './NenOasFragments.json#/responses/400'
    '401':
      $ref: './NenOasFragments.json#/responses/401'
    '403':
      $ref: './NenOasFragments.json#/responses/403'
    '404':
      $ref: './NenOasFragments.json#/responses/404'
    '408':
      $ref: './NenOasFragments.json#/responses/408'
    '500':
      $ref: './NenOasFragments.json#/responses/500'
    '503':
      $ref: './NenOasFragments.json#/responses/503'
    '504':
      $ref: './NenOasFragments.json#/responses/504'
  getCollection: &standardGetResponses
    '400':
      $ref: './NenOasFragments.json#/responses/400'
    '401':
      $ref: './NenOasFragments.json#/responses/401'
    '403':
      $ref: './NenOasFragments.json#/responses/403'
    '408':
      $ref: './NenOasFragments.json#/responses/408'
    '429':
      $ref: './NenOasFragments.json#/responses/429'
    '500':
      $ref: './NenOasFragments.json#/responses/500'
    '503':
      $ref: './NenOasFragments.json#/responses/503'
    '504':
      $ref: './NenOasFragments.json#/responses/504'
paths:
  /health:
    get:
      description: |
        Check the status of the service. Returns UP or DOWN with the time of the check.
        $comment: to be discussed what health is being checked; the gateway health, or of all the services 'behind' the gateway
      tags:
        - Healthcheck
      summary: Healthstatus service
      operationId: getHealthStatus
      parameters:
        - $ref: './NenOasFragments.json#/parameters/correlationId'
      responses:
        '200':
          description: Service status received
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: './NenOasFragments.json#/schemas/healthStatus'
        <<: *standardGetResponses
      security:
      - clientCredentials:
        - monitor
  /events/{channel}:
    post:
      summary: restful endpoint for publishing a CloudEvent via HTTP
      description: Publishes a CloudEvent to the broker channel.
      operationId: postEvent
      tags:
        - Event
      parameters:
      - $ref: './NenOasFragments.json#/parameters/correlationId'
      - $ref: '#/components/parameters/channel'
      - $ref: '#/components/parameters/subscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/refId'
      responses:
        '202':
          $ref: './NenOasFragments.json#/responses/202'
        '400':
          $ref: './NenOasFragments.json#/responses/400'
        '401':
          $ref: './NenOasFragments.json#/responses/401'
        '403':
          $ref: './NenOasFragments.json#/responses/403'
        '500':
          $ref: './NenOasFragments.json#/responses/500'
        '503':
          $ref: './NenOasFragments.json#/responses/503'
        '504':
          $ref: './NenOasFragments.json#/responses/504'
      security:
      - clientCredentials:
        - norm:publish
    get:
      description: List of events for a channel
      operationId: listEvents
      tags:
      - Event
      parameters:
      - $ref: './NenOasFragments.json#/parameters/correlationId'
      - name: channel
        in: path
        required: true
        schema:
          $ref: '../CDM/cloudEvents.json#/definitions/publicationChannel'
      responses:
        '200':
          description: List of events for the channel
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    eventId:
                      $ref: '../CDM/cloudEvents.json#/properties/id'
                    refId:
                      $ref: '#/components/schemas/refId'
          links:
            getEvent:
              $ref: './NenOasFragments.json#/links/events'
      security:
      - clientCredentials:
        - norm:publish
        - norm:subscribe
  /events/{channel}/{eventId}:
    get:
      summary: Retrieve CloudEvent over HTTP
      description: Get a specific CloudEvents from a channel.
      operationId: getEvent
      tags:
      - Event
      parameters:
      - $ref: './NenOasFragments.json#/parameters/correlationId'
      - name: channel
        in: path
        required: true
        schema:
          $ref: '../CDM/cloudEvents.json#/definitions/publicationChannel'
      - $ref: '#/components/parameters/subscriptionId'
      - name: eventId
        in: path
        required: true
        schema:
          $ref: '../CDM/cloudEvents.json#/definitions/iddef'
      responses:
        '200':
          description: Event retrieved successfully
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '../CDM/cloudEvents.json#'
        '400':
          $ref: './NenOasFragments.json#/responses/400'
        '401':
          $ref: './NenOasFragments.json#/responses/401'
        '403':
          $ref: './NenOasFragments.json#/responses/403'
        '404':
          description: Event not found for the given channel and eventId
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
        '500':
          $ref: './NenOasFragments.json#/responses/500'
        '503':
          $ref: './NenOasFragments.json#/responses/503'
        '504':
          $ref: './NenOasFragments.json#/responses/504'
      security:
      - clientCredentials:
        - norm:publish
        - norm:subscribe
  /subscriptions:
    description: Manage CloudEvents subscriptions for Publication events. Subscriptions are used to receive updates on changes to publication data via the eventing system, as an alternative to polling for updates via the REST API.
    summary: Create CloudEvents subscriptions 
    parameters:
    - $ref: './NenOasFragments.json#/parameters/correlationId'
    post:
      operationId: createSubscription
      description: Create a subscription
      tags:
      - Subscription
      parameters:
        - $ref: './NenOasFragments.json#/parameters/correlationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../CDM/cloudEvents.json#/definitions/subscriptionRequest'
      responses:
        "201":
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: '../CDM/cloudEvents.json#/definitions/subscription'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
        "400":
          $ref: './NenOasFragments.json#/responses/400'
        "401":
          $ref: './NenOasFragments.json#/responses/401'
        "403":
          $ref: './NenOasFragments.json#/responses/403'
      security:
      - clientCredentials:
        - norm:publish
        - norm:subscribe
  /subscriptions/{channel}:
    description: Manage CloudEvents subscriptions for Committee events. Subscriptions are used to receive updates on changes to committee and member data via the eventing system, as an alternative to polling for updates via the REST API.
    summary: Create and Terminate CloudEvents subscriptions 
    parameters:
    - $ref: './NenOasFragments.json#/parameters/correlationId'
    - $ref: '#/components/parameters/channel'
    get:
      operationId: getSubscriptions
      description: Retrieve list of subscriptions for the given channel
      tags: 
      - Subscription
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/parameters/correlationId'
          content:
            application/json:
              schema:
                $ref: '../CDM/cloudEvents.json#/definitions/subscriptionList'
          links:
            getEvents:
              $ref: './NenOasFragments.json#/links/eventList'
            postEvents :
              $ref: './NenOasFragments.json#/links/postEvents'
        <<: *standardGetResponses
      security:
      - clientCredentials:
        - committee:admin
    delete:
      operationId: endSubscription
      description: Unsubscribe from the given channel
      tags: 
      - Subscription
      parameters:
        - $ref: '#/components/parameters/subscriptionId'
      responses:
        "204":
          description: No Content
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/parameters/correlationId'
        "400":
          $ref: './NenOasFragments.json#/responses/400'
        "404":
          $ref: './NenOasFragments.json#/responses/404'
      security:
      - clientCredentials:
        - committee:admin
  /families:
    get:
      description: List of families, filtered by query parameters, sorted by updatedAt (oldest first)
      operationId: listFamilies
      summary: List of families
      tags:
        - Family
      parameters:
        - $ref: './NenOasFragments.json#/parameters/fromDate'
        - $ref: './NenOasFragments.json#/parameters/maxNumberOfItems'
        - $ref: './NenOasFragments.json#/parameters/correlationId'
      responses:
        '200':
          description: Family list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/familyList'
          links:
            getFamily:
              $ref: '#/components/links/families'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
        '206':
          description: Partial family list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/familyList'
          links:
            getFamily:
              $ref: '#/components/links/families'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
            X-Next:
              $ref: './NenOasFragments.json#/headers/next'
        <<: *standardGetResponses
      servers:
        - url: https://example.com/poolparty/familyAPI
          description: provisional specification for the endpoint in the source system. Please update with final values
      security:
        - clientCredentials:
          - norm:read
  /families/{familyId}:
    get:
      description: Retrieve NEN family with details if its eTag value has changed or if no eTag value is given
      operationId: getFamilyById
      tags:
        - Family
      summary: Retrieve family by Id
      parameters:
        - name: familyId
          in: path
          required: true
          schema:
            $ref: '../CDM/NenIdentifiers.json#/definitions/nenFamilyId'
          description: Unique ID of the NEN family
        - $ref: './NenOasFragments.json#/parameters/correlationId'
        - $ref: './NenOasFragments.json#/parameters/ifChanged'
      responses:
        '200':
          description: Family details
          content:
            application/json:
              schema:
                $ref: '../CDM/NenFamily_V0.9.0.json#'
          links:
            getFamilyAdmins:
              operationId: getFamilyAdminById
              parameters:
                familyAdminId: "$response.body#/references/nenFamilyAdmins/nenFamilyAdminId"
            getFamily:
              operationId: getFamilyById
              parameters:
                familyAdminId: "$response.body#/references/nenFamilies/nenFamilyId"
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
            ETag:
              $ref: './NenOasFragments.json#/headers/eTag'
        <<: *standardGetWithEtagResponses
      servers:
        - url: https://example.com/poolparty/familyAPI
          description: provisional specification for the endpoint in the source system. Please update with final values
      security:
        - clientCredentials:
          - norm:read
  /familyAdmins:
    get:
      description: List of familieAdmins, filtered by query parameters, sorted by updatedAt (oldest first)
      operationId: listFamilieAdmins
      summary: List of familyAdmins
      tags:
        - FamilyAdmin
      parameters:
        - $ref: '#/components/parameters/familyFilter'
        - $ref: './NenOasFragments.json#/parameters/fromDate'
        - $ref: './NenOasFragments.json#/parameters/maxNumberOfItems'
        - $ref: './NenOasFragments.json#/parameters/correlationId'
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/familyAdminList'
          links:
            getFamily:
              $ref: '#/components/links/families'
            getFamilyAdmins:
              $ref: '#/components/links/familyAdmins'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
        '206':
          description: Partial project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/familyAdminList'
          links:
            getFamily:
              $ref: '#/components/links/families'
            getFamilyAdmins:
              $ref: '#/components/links/familyAdmins'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
            X-Next:
              $ref: './NenOasFragments.json#/headers/next'
        <<: *standardGetResponses
      servers:
        - url: https://example.com/poolparty/familyAdminAPI
          description: provisional specification for the endpoint in the source system. Please update with final values
      security:
        - clientCredentials:
          - norm:read
  /familyAdmins/{familyAdminId}:
    get:
      description: Retrieve NEN familyAdmin with details if its eTag value has changed or if no eTag value is given
      operationId: getFamilyAdminById
      tags:
        - FamilyAdmin
      summary: Retrieve family subtree by AdminId
      parameters:
        - name: familyAdminId
          in: path
          required: true
          schema:
            $ref: '../CDM/NenIdentifiers.json#/definitions/nenFamilyAdminId'
          description: Unique ID of the NEN family admin
        - $ref: './NenOasFragments.json#/parameters/correlationId'
        - $ref: './NenOasFragments.json#/parameters/ifChanged'
      responses:
        '200':
          description: Family admin details
          content:
            application/json:
              schema:
                $ref: '../CDM/NenFamilyAdmin_V0.9.0.json#'
          links:
            getProjecs:
              operationId: getProjectById
              parameters:
                familyAdminId: "$response.body#/references/projects/nenProjectId"
            getCommittee:
              operationRef: "https://api.example.com/committee/v1/committee/get"
              parameters:
                familyAdminId: "$response.body#/references/committee"
            getFamily:
              operationId: getFamilyById
              parameters:
                familyAdminId: "$response.body#/references/family"
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
            ETag:
              $ref: './NenOasFragments.json#/headers/eTag'
        <<: *standardGetWithEtagResponses
      servers:
        - url: https://example.com/poolparty/familyAdminAPI
          description: provisional specification for the endpoint in the source system. Please update with final values
      security:
        - clientCredentials:
          - norm:read
  /projects:
    get:
      description: List of projects, filtered by query parameters, sorted by updatedAt (oldest first)
      operationId: listProjects
      summary: List projects
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/familyFilter'
        - $ref: '#/components/parameters/familyAdminFilter'
        - $ref: './NenOasFragments.json#/parameters/fromDate'
        - $ref: './NenOasFragments.json#/parameters/maxNumberOfItems'
        - $ref: './NenOasFragments.json#/parameters/correlationId'
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projectList'
          links:
            getFamily:
              $ref: '#/components/links/families'
            getFamilyAdmin:
              $ref: '#/components/links/familyAdmins'
            getProjects:
              $ref: '#/components/links/projects'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
        '206':
          description: Partial project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projectList'
          links:
            getFamily:
              $ref: '#/components/links/families'
            getFamilyAdmin:
              $ref: '#/components/links/familyAdmins'
            getProjects:
              $ref: '#/components/links/projects'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
            X-Next:
              $ref: './NenOasFragments.json#/headers/next'
        <<: *standardGetResponses
      servers:
        - url: https://example.com/sitefusion/projectAPI
          description: provisional specification for the endpoint in the source system. Please update with final values
      security:
        - clientCredentials:
          - norm:read
  /projects/{projectId}:
    get:
      description: Retrieve NEN project with details if its eTag value has changed or if no eTag value is given
      operationId: getProjectById
      tags:
        - Project
      summary: Retrieve project by Id
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            $ref: '../CDM/NenIdentifiers.json#/definitions/nenProjectId'
          description: Unique ID of the NEN project
        - $ref: './NenOasFragments.json#/parameters/correlationId'
        - $ref: './NenOasFragments.json#/parameters/ifChanged'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '../CDM/NenProject_V0.9.0.json#'
          links:
            getFamily:
              operationId: getFamilyById
              parameters:
                familyAdminId: "$response.body#/references/family"
            getProject:
              operationId: getProjectById
              parameters:
                familyAdminId: "$response.body#/references/committee"
            getPublications:
              operationId: getPublicationById
              parameters:
                familyAdminId: "$response.body#/nenStages/nenPublicationId"
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
            ETag:
              $ref: './NenOasFragments.json#/headers/eTag'
        <<: *standardGetWithEtagResponses
      servers:
        - url: https://example.com/sitefusion/projectAPI
          description: provisional specification for the endpoint in the source system. Please update with final values
      security:
        - clientCredentials:
          - norm:read
  /publications:
    get:
      description: List of publications, filtered by query parameters, sorted by sorted by updatedAt (oldest first)
      operationId: listPublications
      summary: List publications
      tags:
        - Publication
      parameters:
        - $ref: '#/components/parameters/familyFilter'
        - $ref: '#/components/parameters/familyAdminFilter'
        - $ref: '#/components/parameters/projectFilter'
        - $ref: './NenOasFragments.json#/parameters/fromDate'
        - $ref: './NenOasFragments.json#/parameters/maxNumberOfItems'
        - $ref: './NenOasFragments.json#/parameters/correlationId'
      responses:
        '200':
          description: Publication list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/publicationList'
          links:
            getFamilies:
              $ref: '#/components/links/families'
            getFamilyAdmins:
              $ref: '#/components/links/familyAdmins'
            getProjects:
              $ref: '#/components/links/projects'
            getPublications:
              $ref: '#/components/links/publications'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
        '206':
          description: Partial publication list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/publicationList'
          links:
            getFamilie:
              $ref: '#/components/links/families'
            getFamilyAdmins:
              $ref: '#/components/links/familyAdmins'
            getProjects:
              $ref: '#/components/links/projects'
            getPublications:
              $ref: '#/components/links/publications'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
            X-Next:
              $ref: './NenOasFragments.json#/headers/next'
        <<: *standardGetResponses
      servers:
        - url: https://example.com/sitefusion/publicationAPI
          description: provisional specification for the endpoint in the source system. Please update with final values
      security:
        - clientCredentials:
          - norm:read
  /publications/{publicationId}:
    get:
      description: Retrieve NEN publication with details if its eTag value has changed or if no eTag value is given
      operationId: getPublicationById
      tags:
        - Project
      summary: Retrieve publication by Id
      parameters:
        - name: publicationId
          in: path
          required: true
          schema:
            $ref: '../CDM/NenIdentifiers.json#/definitions/nenPublicationId'
          description: Unique ID of the NEN publication
        - $ref: './NenOasFragments.json#/parameters/correlationId'
        - $ref: './NenOasFragments.json#/parameters/ifChanged'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '../CDM/NenPublication_V0.9.0.json#'
          links:
            getProject:
              operationId: getProjectById
              parameters:
                projectId: "$response.body#/references/projectid"
            getReleaseItems:
              operationId: getReleaseItemById
              parameters:
                releaeItemId: "$response.body#/references/nenReleaseItems/nenContentRefId"
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
            ETag:
              $ref: './NenOasFragments.json#/headers/eTag'
        <<: *standardGetWithEtagResponses
      servers:
        - url: https://example.com/sitefusion/publicationAPI
          description: provisional specification for the endpoint in the source system. Please update with final values
      security:
        - clientCredentials:
          - norm:read
  /releaseItems:
    get:
      description: List of release items, filtered by query parameters, sorted by sorted by updatedAt (oldest first)
      operationId: listReleaseItems
      summary: List of release items
      tags:
        - ReleaseItem
      parameters:
        - $ref: '#/components/parameters/familyFilter'
        - $ref: '#/components/parameters/familyAdminFilter'
        - $ref: '#/components/parameters/projectFilter'
        - $ref: '#/components/parameters/publicationFilter'
        - $ref: './NenOasFragments.json#/parameters/fromDate'
        - $ref: './NenOasFragments.json#/parameters/maxNumberOfItems'
        - $ref: './NenOasFragments.json#/parameters/correlationId'
      responses:
        '200':
          description: Release item list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/releaseItemList'
          links:
            getFamilies:
              $ref: '#/components/links/families'
            getFamilyAdmins:
              $ref: '#/components/links/familyAdmins'
            getProjects:
              $ref: '#/components/links/projects'
            getPublications:
              $ref: '#/components/links/publications'
            getReleaseItems:
              $ref: '#/components/links/releaseItems'
          headers:
            X-Correlation-Id:
              $ref: './NenOasFragments.json#/headers/correlationId'
        '206':
          description: Partial publication list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/publicationList'
          links:
            getFamilies:
              $ref: '#/components/links/families'
            getFamilyAdmins:
              $ref: '#/components/links/familyAdmins'
            getProjects:
              $ref: '#/components/links/projects'
            getPublications:
              $ref: '#/components/links/publications'
            getReleaseItems:
